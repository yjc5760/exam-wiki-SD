<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>SD-2023-1 簡支梁模態形狀</title>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; margin: 0; padding: 16px; }
  h2 { text-align: center; color: #a8d8ea; font-size: 15px; margin: 0 0 10px; }
  .container { width: 580px; margin: 0 auto; }
  canvas { display: block; margin: 0 auto; background: #16213e; border-radius: 8px; }
  .controls { display: flex; justify-content: center; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
  button {
    padding: 6px 14px; border: none; border-radius: 4px;
    cursor: pointer; font-size: 13px; font-weight: bold;
    background: #0f3460; color: #a8d8ea; border: 1px solid #a8d8ea44;
    transition: background 0.2s;
  }
  button.active { background: #e94560; color: #fff; border-color: #e94560; }
  button:hover:not(.active) { background: #1a4a80; }
  .info-box { background: #0f3460; border-radius: 6px; padding: 10px 14px; margin-top: 10px; font-size: 12.5px; line-height: 1.7; }
  .info-box span.val { color: #f4a261; font-weight: bold; }
  .info-box span.label { color: #a8d8ea; }
  .toggle-row { display: flex; justify-content: center; gap: 16px; margin: 6px 0; }
  label { font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .legend { display: flex; justify-content: center; gap: 18px; margin-top: 8px; font-size: 12px; }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 18px; height: 3px; border-radius: 2px; }
  .formula { text-align: center; font-size: 12px; color: #a8d8ea; margin: 6px 0; font-style: italic; }
</style>
</head>
<body>
<div class="container">
  <h2>SD-2023-1 — 均質等斷面簡支梁：模態形狀動態展示</h2>
  <div class="formula">ωₙ = (n²π²/L²)·√(EI/m̄) &nbsp;|&nbsp; φₙ(x) = sin(nπx/L)</div>
  <canvas id="cv" width="548" height="220"></canvas>

  <div class="controls">
    <button id="btn1" class="active" onclick="setMode(1)">模態 1</button>
    <button id="btn2" onclick="setMode(2)">模態 2</button>
    <button id="btn3" onclick="setMode(3)">模態 3</button>
    <button id="btn4" onclick="setMode(4)">模態 4</button>
    <button id="btnAll" onclick="setMode(0)">疊加 (1+3)</button>
  </div>

  <div class="toggle-row">
    <label><input type="checkbox" id="chkAnimate" checked> 動畫</label>
    <label><input type="checkbox" id="chkForce" checked> 顯示載重位置</label>
    <label><input type="checkbox" id="chkNode" checked> 顯示節點</label>
  </div>

  <div class="info-box" id="infoBox"></div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#61dafb"></div>模態形狀</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f4a261"></div>中點載重 P(t)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#e94560"></div>節點（零位移）</div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
const PAD = { l: 40, r: 40, t: 40, b: 60 };
const BW = W - PAD.l - PAD.r;  // beam width in px
const BY = H / 2;               // beam y-center

let mode = 1;
let t = 0;
let animId;

const colors = ['#61dafb', '#ffd166', '#06d6a0', '#ef476f'];

const modeInfo = {
  0: { name: '奇數模態疊加 (n=1+3)', freq: '疊加 ω₁ + ω₃', Q: 'Q₁=P(t)·1, Q₂=0, Q₃=P(t)·(−1)', nodes: [] },
  1: { name: '第 1 模態 (n=1)', freq: 'ω₁ = π²/L²·√(EI/m̄)', Q: 'Q₁(t) = P(t)·sin(π/2) = P(t)', nodes: [] },
  2: { name: '第 2 模態 (n=2)', freq: 'ω₂ = 4π²/L²·√(EI/m̄) = 4ω₁', Q: 'Q₂(t) = P(t)·sin(π) = 0  ← 不受激振！', nodes: [0.5] },
  3: { name: '第 3 模態 (n=3)', freq: 'ω₃ = 9π²/L²·√(EI/m̄) = 9ω₁', Q: 'Q₃(t) = P(t)·sin(3π/2) = −P(t)', nodes: [1/3, 2/3] },
  4: { name: '第 4 模態 (n=4)', freq: 'ω₄ = 16π²/L²·√(EI/m̄) = 16ω₁', Q: 'Q₄(t) = P(t)·sin(2π) = 0  ← 不受激振！', nodes: [0.25, 0.5, 0.75] },
};

function setMode(m) {
  mode = m;
  [0,1,2,3,4].forEach(i => {
    const btn = document.getElementById(i === 0 ? 'btnAll' : 'btn' + i);
    if (btn) btn.className = (i === m) ? 'active' : '';
  });
}

function phi(n, x) {
  return Math.sin(n * Math.PI * x);  // x normalized 0..1
}

function drawBeam(amp) {
  const N = 300;
  const showAnimate = document.getElementById('chkAnimate').checked;
  const showForce = document.getElementById('chkForce').checked;
  const showNode = document.getElementById('chkNode').checked;

  ctx.clearRect(0, 0, W, H);

  // Background grid lines
  ctx.strokeStyle = '#1e3a5f';
  ctx.lineWidth = 1;
  for (let y = BY - 80; y <= BY + 80; y += 20) {
    ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(W - PAD.r, y); ctx.stroke();
  }

  // Equilibrium line
  ctx.strokeStyle = '#2a5a8a';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(PAD.l, BY);
  ctx.lineTo(W - PAD.r, BY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw mode shape
  ctx.beginPath();
  const maxAmp = 70;
  for (let i = 0; i <= N; i++) {
    const xi = i / N;
    let y;
    if (mode === 0) {
      // Superposition of mode 1 and mode 3
      const a1 = showAnimate ? Math.cos(t) : 1;
      const a3 = showAnimate ? Math.cos(9 * t) : 1;
      y = BY - maxAmp * (0.7 * phi(1, xi) * a1 + 0.3 * phi(3, xi) * a3);
    } else {
      const anim = showAnimate ? Math.cos(mode * mode * t) : 1;
      y = BY - maxAmp * phi(mode, xi) * anim;
    }
    const px = PAD.l + xi * BW;
    if (i === 0) ctx.moveTo(px, y);
    else ctx.lineTo(px, y);
  }
  ctx.strokeStyle = mode === 0 ? '#06d6a0' : colors[(mode - 1) % 4];
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Fill area
  ctx.beginPath();
  for (let i = 0; i <= N; i++) {
    const xi = i / N;
    let y;
    if (mode === 0) {
      const a1 = showAnimate ? Math.cos(t) : 1;
      const a3 = showAnimate ? Math.cos(9 * t) : 1;
      y = BY - maxAmp * (0.7 * phi(1, xi) * a1 + 0.3 * phi(3, xi) * a3);
    } else {
      const anim = showAnimate ? Math.cos(mode * mode * t) : 1;
      y = BY - maxAmp * phi(mode, xi) * anim;
    }
    const px = PAD.l + xi * BW;
    if (i === 0) ctx.moveTo(px, BY);
    ctx.lineTo(px, y);
  }
  ctx.lineTo(W - PAD.r, BY);
  ctx.closePath();
  const fillColor = mode === 0 ? '#06d6a0' : colors[(mode - 1) % 4];
  ctx.fillStyle = fillColor + '22';
  ctx.fill();

  // Supports
  drawSupport(PAD.l, BY);
  drawSupport(W - PAD.r, BY);

  // Beam line (static)
  ctx.strokeStyle = '#8ab4cc';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(PAD.l, BY + 3);
  ctx.lineTo(W - PAD.r, BY + 3);
  ctx.stroke();

  // Node points
  if (showNode && mode > 0) {
    const nodes = modeInfo[mode].nodes;
    nodes.forEach(xn => {
      const px = PAD.l + xn * BW;
      ctx.beginPath();
      ctx.arc(px, BY, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#e94560';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#e94560';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('節點', px, BY + 16);
    });
  }

  // Force arrow at midpoint
  if (showForce) {
    const fx = PAD.l + 0.5 * BW;
    const anim = showAnimate ? Math.abs(Math.cos(t)) : 1;
    const arrowLen = 30 * anim + 10;
    ctx.strokeStyle = '#f4a261';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(fx, BY - 80);
    ctx.lineTo(fx, BY - 80 + arrowLen);
    ctx.stroke();
    // Arrowhead
    ctx.beginPath();
    ctx.moveTo(fx - 7, BY - 80 + arrowLen - 10);
    ctx.lineTo(fx, BY - 80 + arrowLen);
    ctx.lineTo(fx + 7, BY - 80 + arrowLen - 10);
    ctx.strokeStyle = '#f4a261';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#f4a261';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('P(t)', fx, BY - 85);
  }

  // x-axis labels
  ctx.fillStyle = '#8ab4cc';
  ctx.font = '11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('0', PAD.l, H - 8);
  ctx.fillText('L/4', PAD.l + BW * 0.25, H - 8);
  ctx.fillText('L/2', PAD.l + BW * 0.5, H - 8);
  ctx.fillText('3L/4', PAD.l + BW * 0.75, H - 8);
  ctx.fillText('L', W - PAD.r, H - 8);

  // Label
  const info = modeInfo[mode];
  ctx.fillStyle = mode === 0 ? '#06d6a0' : colors[(mode - 1) % 4];
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(info.name, PAD.l, 22);

  // Update info box
  document.getElementById('infoBox').innerHTML =
    `<span class="label">模態名稱：</span><span class="val">${info.name}</span><br>` +
    `<span class="label">模態頻率：</span><span class="val">${info.freq}</span><br>` +
    `<span class="label">模態載重：</span><span class="val">${info.Q}</span>` +
    (mode > 0 ? `<br><span class="label">模態函數：</span><span class="val">φ${mode}(x) = sin(${mode}πx/L)，節點 ${modeInfo[mode].nodes.length} 個</span>` : '');
}

function drawSupport(x, y) {
  // Triangle
  ctx.beginPath();
  ctx.moveTo(x, y + 3);
  ctx.lineTo(x - 12, y + 24);
  ctx.lineTo(x + 12, y + 24);
  ctx.closePath();
  ctx.fillStyle = '#3a6186';
  ctx.fill();
  ctx.strokeStyle = '#8ab4cc';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Ground line
  ctx.beginPath();
  ctx.moveTo(x - 14, y + 26);
  ctx.lineTo(x + 14, y + 26);
  ctx.strokeStyle = '#8ab4cc';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function animate() {
  if (document.getElementById('chkAnimate').checked) t += 0.04;
  drawBeam();
  animId = requestAnimationFrame(animate);
}

document.getElementById('chkAnimate').addEventListener('change', () => {
  if (!document.getElementById('chkAnimate').checked) t = 0;
});

animate();
</script>
</body>
</html>
