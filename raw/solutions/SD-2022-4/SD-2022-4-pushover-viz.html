<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>SD-2022-4 Pushover 側力分布對比</title>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; background:#1a1a2e; color:#e0e0e0; margin:0; padding:14px; box-sizing:border-box; }
  h2 { color:#7dd3fc; font-size:14px; margin:0 0 6px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; max-width:580px; }
  .panel { background:#16213e; border-radius:10px; padding:12px; }
  canvas { display:block; }
  .legend { display:flex; flex-wrap:wrap; gap:6px 12px; margin-top:8px; font-size:10px; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:2px; vertical-align:middle; margin-right:3px; }
  table { border-collapse:collapse; width:100%; font-size:11px; margin-top:8px; }
  td,th { border:1px solid #334155; padding:3px 6px; text-align:right; }
  th { background:#0f172a; color:#7dd3fc; text-align:center; }
  td:first-child { text-align:center; font-weight:bold; }
  tr:last-child td { background:#0f172a55; font-weight:bold; color:#fbbf24; }
</style>
</head>
<body>

<div class="row">
  <!-- Building force diagram -->
  <div class="panel" style="flex:0 0 200px;">
    <h2>結構側力示意</h2>
    <canvas id="buildingCanvas" width="190" height="220"></canvas>
    <div style="font-size:10px; color:#94a3b8; margin-top:4px; text-align:center;">滑動選擇分布方法</div>
  </div>

  <!-- Bar chart comparison -->
  <div class="panel" style="flex:1; min-width:260px;">
    <h2>五種分布對比（V = 600 kN）</h2>
    <canvas id="barCanvas" width="310" height="220"></canvas>
    <div class="legend" id="legend"></div>
  </div>
</div>

<!-- Controls -->
<div class="panel" style="max-width:558px; margin-top:10px;">
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; font-size:11px;">
    <span style="color:#94a3b8;">選擇分布：</span>
    <button onclick="selectMethod(0)" id="btn0" class="mbtn">均勻</button>
    <button onclick="selectMethod(1)" id="btn1" class="mbtn">倒三角</button>
    <button onclick="selectMethod(2)" id="btn2" class="mbtn">指數 k=2</button>
    <button onclick="selectMethod(3)" id="btn3" class="mbtn">經驗</button>
    <button onclick="selectMethod(-1)" id="btnAll" class="mbtn active">全部</button>
  </div>
</div>

<!-- Data table -->
<div class="panel" style="max-width:558px; margin-top:10px;">
  <h2>數值結果（kN）</h2>
  <table>
    <tr><th>樓層</th><th style="color:#f59e0b">均勻</th><th style="color:#34d399">倒三角</th><th style="color:#f472b6">指數 k=2</th><th style="color:#60a5fa">經驗</th></tr>
    <tr><td>3F</td><td>200.0</td><td>300.0</td><td>385.7</td><td>300.0</td></tr>
    <tr><td>2F</td><td>200.0</td><td>200.0</td><td>171.4</td><td>210.0</td></tr>
    <tr><td>1F</td><td>200.0</td><td>100.0</td><td>42.9</td><td>90.0</td></tr>
    <tr><td>合計</td><td>600.0</td><td>600.0</td><td>600.0</td><td>600.0</td></tr>
  </table>
</div>

<style>
  .mbtn { background:#1e3a5f; border:1px solid #334155; color:#94a3b8; padding:3px 8px; border-radius:4px; cursor:pointer; font-size:11px; }
  .mbtn:hover { border-color:#7dd3fc; color:#e0e0e0; }
  .mbtn.active { border-color:#7dd3fc; color:#7dd3fc; background:#0f2040; }
</style>

<script>
const methods = [
  { name:'均勻', color:'#f59e0b', forces:[200, 200, 200] },
  { name:'倒三角', color:'#34d399', forces:[100, 200, 300] },
  { name:'指數 k=2', color:'#f472b6', forces:[42.9, 171.4, 385.7] },
  { name:'經驗', color:'#60a5fa', forces:[90, 210, 300] }
];
const floors = ['1F', '2F', '3F'];
let selectedMethod = -1; // -1 = all

// Legend
const legendEl = document.getElementById('legend');
methods.forEach((m,i) => {
  legendEl.innerHTML += `<span><span class="dot" style="background:${m.color}"></span>${m.name}</span>`;
});

function selectMethod(idx) {
  selectedMethod = idx;
  document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('active'));
  const btn = idx === -1 ? document.getElementById('btnAll') : document.getElementById('btn'+idx);
  btn.classList.add('active');
  drawAll();
}

function drawAll() {
  drawBuilding();
  drawBars();
}

// ===== Building side-view =====
function drawBuilding() {
  const c = document.getElementById('buildingCanvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0,0,W,H);

  const storyH = 48;
  const baseY = H - 20;
  const colX = 60;
  const colW = 50;
  const maxForce = 400;
  const arrowScale = 70; // pixels per 400kN

  // Ground
  ctx.strokeStyle='#475569'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(10,baseY); ctx.lineTo(colX+colW+20,baseY); ctx.stroke();

  // Columns
  for(let f=0; f<3; f++) {
    const y0 = baseY - f*storyH;
    const y1 = baseY - (f+1)*storyH;
    ctx.strokeStyle='#334155'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(colX, y0); ctx.lineTo(colX, y1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(colX+colW, y0); ctx.lineTo(colX+colW, y1); ctx.stroke();
    // Floor slab
    ctx.strokeStyle='#475569'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(colX, y1); ctx.lineTo(colX+colW, y1); ctx.stroke();
  }

  // Floor labels
  ctx.fillStyle='#64748b'; ctx.font='10px Arial';
  for(let f=0; f<3; f++) {
    const y = baseY - (f+1)*storyH;
    ctx.fillText(floors[f], colX-22, y+4);
    ctx.fillText((f+1)*3+'m', colX+colW+5, y+4);
  }

  // Force arrows
  const toShow = selectedMethod === -1 ? methods : [methods[selectedMethod]];
  const spread = toShow.length > 1 ? 5 : 0;

  toShow.forEach((m, si) => {
    const offsetY = (si - (toShow.length-1)/2) * spread;
    for(let f=0; f<3; f++) {
      const floorY = baseY - (f+1)*storyH + offsetY;
      const arrowLen = (m.forces[f] / maxForce) * arrowScale;
      const arrowX = colX + colW + 5;

      ctx.strokeStyle = m.color;
      ctx.lineWidth = toShow.length === 1 ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.moveTo(arrowX, floorY);
      ctx.lineTo(arrowX + arrowLen, floorY);
      ctx.stroke();

      // Arrowhead
      ctx.fillStyle = m.color;
      ctx.beginPath();
      ctx.moveTo(arrowX + arrowLen, floorY);
      ctx.lineTo(arrowX + arrowLen - 6, floorY - 4);
      ctx.lineTo(arrowX + arrowLen - 6, floorY + 4);
      ctx.closePath();
      ctx.fill();

      // Force label (only single mode)
      if(selectedMethod !== -1) {
        ctx.font = 'bold 10px Arial';
        ctx.fillStyle = m.color;
        ctx.fillText(m.forces[f].toFixed(0)+' kN', arrowX + arrowLen + 3, floorY + 4);
      }
    }
  });
}

// ===== Horizontal bar chart =====
function drawBars() {
  const c = document.getElementById('barCanvas');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,W,H);

  const ml=60, mb=30, mt=16, mr=20;
  const plotW = W-ml-mr, plotH = H-mb-mt;
  const nGroups = 3;
  const groupH = plotH / nGroups;
  const maxF = 420;

  // Axes
  ctx.strokeStyle='#475569'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ml,mt); ctx.lineTo(ml,mt+plotH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ml,mt+plotH); ctx.lineTo(ml+plotW,mt+plotH); ctx.stroke();

  // X-axis gridlines
  [0,100,200,300,400].forEach(f => {
    const x = ml + (f/maxF)*plotW;
    ctx.strokeStyle='#1e3a5f'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,mt); ctx.lineTo(x,mt+plotH); ctx.stroke();
    ctx.fillStyle='#64748b'; ctx.font='9px Arial'; ctx.textAlign='center';
    ctx.fillText(f+'kN', x, mt+plotH+12);
  });

  // Floor labels
  ctx.fillStyle='#94a3b8'; ctx.font='11px Arial'; ctx.textAlign='right';
  for(let f=0; f<3; f++) {
    const cy = mt + plotH - (f+0.5)*groupH;
    ctx.fillText(floors[f], ml-4, cy+4);
  }

  const toShow = selectedMethod === -1 ? methods : [methods[selectedMethod]];
  const barH = groupH * 0.7 / toShow.length;
  const totalBarH = barH * toShow.length + (toShow.length-1)*2;

  toShow.forEach((m, si) => {
    for(let f=0; f<3; f++) {
      const groupTop = mt + plotH - (f+1)*groupH;
      const groupCenter = groupTop + groupH/2;
      const barY = groupCenter - totalBarH/2 + si*(barH+2);
      const barW = (m.forces[f]/maxF) * plotW;

      ctx.fillStyle = m.color + 'cc';
      ctx.fillRect(ml, barY, barW, barH);
      ctx.strokeStyle = m.color;
      ctx.lineWidth=1;
      ctx.strokeRect(ml, barY, barW, barH);

      // Value label
      ctx.fillStyle = m.color;
      ctx.font = 'bold 9px Arial';
      ctx.textAlign = 'left';
      if(barW > 25) ctx.fillText(m.forces[f].toFixed(0), ml+barW+3, barY+barH*0.75);
    }
  });

  // Title
  ctx.fillStyle='#94a3b8'; ctx.font='10px Arial'; ctx.textAlign='center';
  ctx.fillText('水平力 F (kN)', ml+plotW/2, mt+plotH+24);
}

drawAll();
</script>
</body>
</html>
